name: Validate Solutions

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check required directories exist
      run: |
        echo "Checking repository structure..."

        # Check top-level directories
        for dir in modules projects; do
          if [ ! -d "$dir" ]; then
            echo "❌ Missing required directory: $dir"
            exit 1
          fi
          echo "✓ Directory exists: $dir"
        done

        # Check for README files
        if [ ! -f "README.md" ]; then
          echo "❌ Missing README.md"
          exit 1
        fi
        echo "✓ README.md exists"

        echo "✓ Repository structure validation passed"

    - name: Check implementation guides exist
      run: |
        echo "Checking for implementation guides..."

        missing_guides=0

        # Check each module
        for module_dir in modules/mod-*/; do
          module=$(basename "$module_dir")
          echo "Checking $module..."

          # Count exercises in module
          exercise_count=$(find "$module_dir" -maxdepth 1 -type d -name "exercise-*" | wc -l)

          if [ $exercise_count -gt 0 ]; then
            # Check for implementation guides
            for exercise_dir in "$module_dir"/exercise-*/; do
              if [ -d "$exercise_dir" ]; then
                exercise=$(basename "$exercise_dir")

                if [ ! -f "$exercise_dir/IMPLEMENTATION_GUIDE.md" ] && [ ! -f "$exercise_dir/README.md" ]; then
                  echo "  ⚠️  $module/$exercise missing implementation guide"
                  missing_guides=$((missing_guides + 1))
                fi
              fi
            done
          fi
        done

        if [ $missing_guides -gt 0 ]; then
          echo ""
          echo "⚠️  Found $missing_guides exercises missing implementation guides"
          echo "    This is not a failure, but guides should be added for complete coverage"
        else
          echo "✓ All exercises have implementation guides"
        fi

  validate-markdown:
    name: Validate Markdown Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install markdownlint
      run: npm install -g markdownlint-cli

    - name: Lint markdown files
      run: |
        # Create markdownlint config
        cat > .markdownlint.json << 'EOF'
        {
          "default": true,
          "MD013": false,
          "MD033": false,
          "MD041": false
        }
        EOF

        # Lint all markdown files
        markdownlint '**/*.md' --ignore node_modules || true
        echo "✓ Markdown linting complete"

  validate-python:
    name: Validate Python Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pytest

    - name: Find Python files
      id: find-python
      run: |
        python_files=$(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" | head -10)
        if [ -z "$python_files" ]; then
          echo "has_python=false" >> $GITHUB_OUTPUT
        else
          echo "has_python=true" >> $GITHUB_OUTPUT
        fi

    - name: Lint with flake8
      if: steps.find-python.outputs.has_python == 'true'
      run: |
        # Stop on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
          --exclude=venv,.venv,__pycache__,.git || true

        # Check for code quality (non-blocking)
        flake8 . --count --max-complexity=10 --max-line-length=100 \
          --exclude=venv,.venv,__pycache__,.git --statistics || true

    - name: Check code formatting with black
      if: steps.find-python.outputs.has_python == 'true'
      run: |
        black --check --diff . --exclude="venv|.venv" || true

    - name: Check import ordering
      if: steps.find-python.outputs.has_python == 'true'
      run: |
        isort --check-only --diff . --skip venv --skip .venv || true

  validate-shell-scripts:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Find shell scripts
      id: find-scripts
      run: |
        scripts=$(find . -name "*.sh" -not -path "./venv/*" -not -path "./.venv/*")
        if [ -z "$scripts" ]; then
          echo "has_scripts=false" >> $GITHUB_OUTPUT
        else
          echo "has_scripts=true" >> $GITHUB_OUTPUT
          echo "$scripts" > /tmp/scripts.txt
        fi

    - name: Lint shell scripts
      if: steps.find-scripts.outputs.has_scripts == 'true'
      run: |
        echo "Linting shell scripts..."
        while IFS= read -r script; do
          echo "Checking: $script"
          shellcheck "$script" || true
        done < /tmp/scripts.txt
        echo "✓ Shell script validation complete"

  validate-docker:
    name: Validate Docker Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Find Dockerfiles
      id: find-docker
      run: |
        dockerfiles=$(find . -name "Dockerfile" -o -name "docker-compose.yml")
        if [ -z "$dockerfiles" ]; then
          echo "has_docker=false" >> $GITHUB_OUTPUT
        else
          echo "has_docker=true" >> $GITHUB_OUTPUT
        fi

    - name: Install hadolint
      if: steps.find-docker.outputs.has_docker == 'true'
      run: |
        wget -O /tmp/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
        chmod +x /tmp/hadolint

    - name: Lint Dockerfiles
      if: steps.find-docker.outputs.has_docker == 'true'
      run: |
        echo "Linting Dockerfiles..."
        find . -name "Dockerfile" -exec /tmp/hadolint {} \; || true
        echo "✓ Dockerfile validation complete"

  generate-report:
    name: Generate Validation Report
    runs-on: ubuntu-latest
    needs: [validate-structure, validate-markdown, validate-python, validate-shell-scripts, validate-docker]
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate summary
      run: |
        echo "# Validation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Repository**: Junior Engineer Solutions" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Count modules and exercises
        module_count=$(find modules -maxdepth 1 -type d -name "mod-*" | wc -l)
        exercise_count=$(find modules -type d -name "exercise-*" | wc -l)
        guide_count=$(find modules -name "IMPLEMENTATION_GUIDE.md" | wc -l)

        echo "## Statistics" >> $GITHUB_STEP_SUMMARY
        echo "- **Modules**: $module_count" >> $GITHUB_STEP_SUMMARY
        echo "- **Exercises**: $exercise_count" >> $GITHUB_STEP_SUMMARY
        echo "- **Implementation Guides**: $guide_count" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
        echo "- Structure: ${{ needs.validate-structure.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Markdown: ${{ needs.validate-markdown.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Python: ${{ needs.validate-python.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Shell Scripts: ${{ needs.validate-shell-scripts.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Docker: ${{ needs.validate-docker.result }}" >> $GITHUB_STEP_SUMMARY
