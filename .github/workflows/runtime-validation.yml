name: Runtime Validation

# Adds kubectl / terraform / docker smoke validation on top of the
# main ``ci.yml`` workflow. Kept in a separate file to avoid bloating
# the existing CI and so it can be triggered independently.

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kubectl-dryrun:
    name: kubectl apply --dry-run=client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0
      - name: Validate every Kubernetes manifest
        shell: bash
        run: |
          set -uo pipefail
          shopt -s globstar nullglob
          candidates=(
            projects/**/k8s/**/*.yaml
            projects/**/k8s/**/*.yml
            projects/**/kubernetes/**/*.yaml
            projects/**/kubernetes/**/*.yml
            projects/**/manifests/**/*.yaml
            projects/**/manifests/**/*.yml
            modules/**/k8s/**/*.yaml
            modules/**/k8s/**/*.yml
            modules/**/kubernetes/**/*.yaml
            modules/**/kubernetes/**/*.yml
          )
          files=()
          for pattern in "${candidates[@]}"; do
            for f in $pattern; do
              base="$(basename "$f")"
              case "$base" in
                kustomization.yaml|Chart.yaml|values.yaml|values-*.yaml)
                  continue
                  ;;
              esac
              files+=("$f")
            done
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Kubernetes manifests found; nothing to validate."
            exit 0
          fi
          fails=0
          for f in "${files[@]}"; do
            if ! kubectl apply --dry-run=client --validate=false -f "$f" >/dev/null 2>&1; then
              echo "::error file=$f::kubectl dry-run rejected manifest"
              kubectl apply --dry-run=client --validate=false -f "$f" || true
              fails=$((fails+1))
            fi
          done
          echo "Validated ${#files[@]} manifest(s); ${fails} rejection(s)."
          exit "$fails"

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Run terraform validate in every Terraform module
        shell: bash
        run: |
          set -uo pipefail
          tf_dirs=()
          while IFS= read -r dir; do
            tf_dirs+=("$dir")
          done < <(find projects modules -type f -name '*.tf' -printf '%h\n' 2>/dev/null | sort -u)
          if [ ${#tf_dirs[@]} -eq 0 ]; then
            echo "No Terraform modules found; nothing to validate."
            exit 0
          fi
          fails=0
          for dir in "${tf_dirs[@]}"; do
            echo "=== terraform validate: $dir ==="
            if ! ( cd "$dir" && terraform init -backend=false -input=false >/dev/null 2>&1 \
                   && terraform validate -no-color ); then
              echo "::error file=$dir::terraform validate failed"
              fails=$((fails+1))
            fi
          done
          echo "Validated ${#tf_dirs[@]} Terraform module(s); ${fails} failure(s)."
          exit "$fails"

  docker-build-smoke:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build every Dockerfile (cache-only, smoke)
        shell: bash
        run: |
          set -uo pipefail
          shopt -s globstar nullglob
          dockerfiles=(
            projects/**/Dockerfile
            projects/**/Dockerfile.*
            modules/**/Dockerfile
            modules/**/Dockerfile.*
          )
          if [ ${#dockerfiles[@]} -eq 0 ]; then
            echo "No Dockerfiles found; nothing to smoke-build."
            exit 0
          fi
          fails=0
          for df in "${dockerfiles[@]}"; do
            ctx="$(dirname "$df")"
            echo "=== docker build: $df ==="
            if ! docker buildx build \
                --progress=plain \
                --file "$df" \
                --output type=cacheonly \
                "$ctx" >/dev/null 2>&1; then
              echo "::error file=$df::docker build failed"
              fails=$((fails+1))
            fi
          done
          echo "Smoke-built ${#dockerfiles[@]} image(s); ${fails} failure(s)."
          exit "$fails"
