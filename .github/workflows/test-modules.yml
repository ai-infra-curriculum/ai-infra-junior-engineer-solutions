name: Test Modules

on:
  push:
    paths:
      - 'modules/**'
      - 'projects/**'
  pull_request:
    paths:
      - 'modules/**'
      - 'projects/**'
  workflow_dispatch:

jobs:
  test-python-modules:
    name: Test Python Modules
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Run Python module tests
      run: |
        # Find and run pytest in module directories
        for module_dir in modules/mod-001-python-fundamentals/*/; do
          if [ -f "$module_dir/requirements.txt" ]; then
            echo "Installing requirements for $(basename $module_dir)..."
            pip install -r "$module_dir/requirements.txt" || true
          fi

          if [ -f "$module_dir/test_*.py" ] || [ -d "$module_dir/tests" ]; then
            echo "Running tests in $(basename $module_dir)..."
            pytest "$module_dir" -v || true
          fi
        done

  test-docker-modules:
    name: Test Docker Configurations
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Docker builds
      run: |
        # Find and test Docker configurations
        for dockerfile in $(find modules -name "Dockerfile"); do
          dir=$(dirname "$dockerfile")
          echo "Testing Docker build in $dir..."
          docker build "$dir" -t test-image:latest || true
        done

    - name: Test docker-compose configurations
      run: |
        for compose_file in $(find modules -name "docker-compose.yml"); do
          dir=$(dirname "$compose_file")
          echo "Validating docker-compose in $dir..."
          docker-compose -f "$compose_file" config || true
        done

  test-database-modules:
    name: Test Database Modules
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install database dependencies
      run: |
        pip install psycopg2-binary sqlalchemy pytest

    - name: Test database connections
      env:
        DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
      run: |
        python -c "
        import psycopg2
        try:
            conn = psycopg2.connect('$DATABASE_URL')
            print('✓ PostgreSQL connection successful')
            conn.close()
        except Exception as e:
            print(f'❌ Connection failed: {e}')
        "

    - name: Run database module tests
      env:
        DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
      run: |
        # Run tests for database modules
        for test_dir in modules/mod-008-databases-sql/*/tests; do
          if [ -d "$test_dir" ]; then
            echo "Running tests in $test_dir..."
            pytest "$test_dir" -v || true
          fi
        done

  test-git-modules:
    name: Test Git Exercises
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure Git
      run: |
        git config --global user.name "CI Test"
        git config --global user.email "ci@test.com"

    - name: Test Git exercise scripts
      run: |
        # Test Git exercise scripts if they exist
        for script in modules/mod-003-git-version-control/*/scripts/*.sh; do
          if [ -f "$script" ] && [ -x "$script" ]; then
            echo "Testing script: $script"
            bash -n "$script" || echo "Syntax check failed for $script"
          fi
        done

  test-linux-modules:
    name: Test Linux Scripts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test shell scripts syntax
      run: |
        # Test all shell scripts in Linux modules
        for script in modules/mod-002-linux-essentials/**/scripts/*.sh; do
          if [ -f "$script" ]; then
            echo "Checking syntax: $script"
            bash -n "$script" || echo "Syntax error in $script"
          fi
        done

    - name: Test script executability
      run: |
        # Check that scripts are executable
        for script in modules/mod-002-linux-essentials/**/scripts/*.sh; do
          if [ -f "$script" ] && [ ! -x "$script" ]; then
            echo "⚠️  Script not executable: $script"
          fi
        done

  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: [test-python-modules, test-docker-modules, test-database-modules]
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate module coverage report
      run: |
        echo "# Module Testing Coverage" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Count testable modules
        total_modules=0
        tested_modules=0

        for module_dir in modules/mod-*/; do
          module=$(basename "$module_dir")
          total_modules=$((total_modules + 1))

          # Check if module has tests
          if [ -d "$module_dir/tests" ] || find "$module_dir" -name "test_*.py" | grep -q .; then
            tested_modules=$((tested_modules + 1))
            echo "- ✓ $module (has tests)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️  $module (no tests)" >> $GITHUB_STEP_SUMMARY
          fi
        done

        echo "" >> $GITHUB_STEP_SUMMARY
        coverage=$((tested_modules * 100 / total_modules))
        echo "**Coverage**: $tested_modules/$total_modules modules ($coverage%)" >> $GITHUB_STEP_SUMMARY
