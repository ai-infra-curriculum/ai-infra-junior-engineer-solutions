services:
  api:
    build: .
    image: flask-model-api:dev
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      MODEL_PATH: /models/current/model.joblib
      FEATURE_COUNT: "4"
    volumes:
      - ./models:/models:ro

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
